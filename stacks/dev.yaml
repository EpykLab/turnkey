config:
  cluster.provider: doks
  cluster.provisionMode: managed
  cluster.name: turnkey-dev
  cluster.region: nyc1
  cluster.version: 1.35.1-do.1
  cluster.nodeCount: "1"
  # Room for Kyverno admission/background + Argo on one node (2 vCPU was tight).
  cluster.nodeSize: s-4vcpu-8gb
  cluster.env: dev
  cluster.kubeconfig: ""
  argocd.repoUrl: https://github.com/EpykLab/turnkey
  argocd.targetRevision: master
  argocd.path: bootstrap
  doppler.project: stellarbridge
  doppler.config: dev
  otel.elasticEndpoint: https://elastic.internal:4317
  # Optional components (wire through Pulumi when implemented; inert until read by code)
  features.tekton: "false"
  features.kargo: "false"
  features.observability_stack: "false"
