{{- if .Values.externalSecrets.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: turnkey-external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: platform
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: {{ .Values.externalSecrets.targetRevision | quote }}
    helm:
      releaseName: external-secrets
      valuesObject:
        installCRDs: true
        {{- with .Values.externalSecrets.helmValues }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.externalSecrets.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      # ESO CRDs are ~126KB — under the 262KB annotation limit, so SSA is not needed.
      # Removing SSA keeps ArgoCD on the three-way merge path which handles unknown
      # schema fields (e.g. .status.terminatingReplicas) without a buildTypedValue error.
{{- end }}
