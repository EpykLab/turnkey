{{- if and .Values.helloPlaceholder .Values.helloPlaceholder.enabled }}
{{- range (.Values.helloPlaceholder.apps | default list) }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: {{ .syncWave | default "55" | quote }}
    {{- if .kargoAuthorizedStage }}
    kargo.akuity.io/authorized-stage: {{ .kargoAuthorizedStage | quote }}
    {{- end }}
spec:
  project: {{ .project | default "tenant" | quote }}
  source:
    repoURL: {{ .repoURL | default $.Values.helloPlaceholder.repoURL | default $.Values.argocd.repoUrl | quote }}
    targetRevision: {{ .targetRevision | default $.Values.helloPlaceholder.targetRevision | default $.Values.argocd.targetRevision | quote }}
    path: {{ .path | quote }}
    {{- if or .helmValueFiles .helmValues }}
    helm:
      {{- if .helmValueFiles }}
      valueFiles:
        {{- range .helmValueFiles }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- if .helmValues }}
      valuesObject:
        {{- .helmValues | toYaml | nindent 8 }}
      {{- end }}
    {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .namespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
{{- end }}
{{- end }}
