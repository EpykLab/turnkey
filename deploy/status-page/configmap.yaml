apiVersion: v1
kind: ConfigMap
metadata:
  name: turnkey-status-html
  namespace: turnkey-status
  labels:
    app.kubernetes.io/name: turnkey-status-page
    app.kubernetes.io/component: status-page
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1"/>
      <title>Turnkey</title>
      <style>
        :root { color-scheme: light dark; }
        body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center;
               background: #0f1419; color: #e6edf3; }
        main { text-align: center; padding: 2rem; max-width: 36rem; }
        h1 { font-weight: 600; letter-spacing: 0.04em; margin: 0 0 0.5rem; font-size: 1.75rem; }
        p { margin: 0.35rem 0; opacity: 0.9; line-height: 1.5; }
        .ok { color: #3fb950; font-weight: 500; margin-top: 1.25rem; }
      </style>
    </head>
    <body>
      <main>
        <h1>Turnkey</h1>
        <p>Platform baseline is deployed and this page is live.</p>
        <p class="ok">All checks passed &mdash; cluster is reachable.</p>
      </main>
    </body>
    </html>
