{{- if .Values.ingressNginx.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: turnkey-ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: {{ .Values.ingressNginx.targetRevision | quote }}
    helm:
      releaseName: ingress-nginx
      valuesObject:
        {{- toYaml .Values.ingressNginx.helmValues | nindent 8 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.ingressNginx.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      # Skip ingress-nginx admission webhook hooks that can get stuck
      - Validate=false
{{- end }}
