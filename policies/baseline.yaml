# Plain manifests (no Helm). Applied as Argo CD second source after Kyverno chart (see chart/templates/kyverno/argocd-application.yaml).
# Fork note: the turnkey.io/change-control annotations below are informational references.
# They will still show the upstream URL after forking — this is intentional (provenance tracking).
# The Kyverno enforcement only checks that the annotation exists, not its value.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged
  annotations:
    turnkey.io/change-control: "https://github.com/EpykLab/turnkey"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - kyverno
                - kube-system
                - argocd
                - cert-manager
                - ingress-nginx
                - external-secrets
                - tekton-pipelines
                - tekton-pipelines-resolvers
                - doppler-operator-system
                - kargo
                - kargo-cluster-secrets
                - kargo-shared-resources
                - kargo-system-resources
                - turnkey-compliance
          - resources:
              kinds:
                - CronJob
                - Job
              namespaces:
                - turnkey-compliance
      validate:
        message: "Privileged containers are not allowed."
        pattern:
          spec:
            containers:
              - securityContext:
                  privileged: false
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resources-and-probes
  annotations:
    turnkey.io/change-control: "https://github.com/EpykLab/turnkey"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-requests-and-limits
      match:
        any:
          - resources:
              kinds: ["Pod"]
      exclude:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces:
                - kyverno
                - kube-system
                - argocd
                - cert-manager
                - ingress-nginx
                - external-secrets
                - tekton-pipelines
                - tekton-pipelines-resolvers
                - doppler-operator-system
                - kargo
                - kargo-cluster-secrets
                - kargo-shared-resources
                - kargo-system-resources
                - turnkey-compliance
          - resources:
              kinds:
                - CronJob
                - Job
              namespaces:
                - turnkey-compliance
      validate:
        message: "CPU/memory requests and limits are required."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
    - name: require-readiness-and-liveness
      match:
        any:
          - resources:
              kinds: ["Pod"]
      exclude:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces:
                - kyverno
                - kube-system
                - argocd
                - cert-manager
                - ingress-nginx
                - external-secrets
                - tekton-pipelines
                - tekton-pipelines-resolvers
                - doppler-operator-system
                - kargo
                - kargo-cluster-secrets
                - kargo-shared-resources
                - kargo-system-resources
                - turnkey-compliance
          - resources:
              kinds:
                - CronJob
                - Job
              namespaces:
                - turnkey-compliance
      validate:
        message: "readinessProbe and livenessProbe are required."
        pattern:
          spec:
            containers:
              - livenessProbe: {}
                readinessProbe: {}
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: image-hygiene
  annotations:
    turnkey.io/change-control: "https://github.com/EpykLab/turnkey"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: no-latest-tag
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: "Using :latest is not allowed."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
