# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

env:
  PLATFORM: "doks"

tasks:
  pulumi:stack:init:
    desc: Generate and store a new Pulumi state encryption password
    silent: true
    cmds:
      - |
        read -s -p "New encryption password: " PULUMI_CONFIG_PASSPHRASE
        echo

        read -p "Stack name: " PULUMI_STACK_NAME
        echo
        export PULUMI_STACK_NAME
        export PULUMI_CONFIG_PASSPHRASE

        cd pulumi && pulumi stack init $PULUMI_STACK_NAME

  pulumi:password:rotate:
    desc: Rotate the Pulumi state encryption password
    silent: true
    cmds:
      - cd pulumi && pulumi stack change-secrets-provider passphrase
  show-kubecfg:
    desc: Show the kubeconfig
    cmds:
      - cd pulumi/ && pulumi stack output kubeconfig --show-secrets

  save-kubecfg:
    desc: Save the kubeconfig
    cmds:
      - |
        read -p "This will overwrite ~/.kube/config. Continue? [y/n] "
        echo    # Move to a new line
        if [[ $REPLY =~ ^[Yy]$ ]]; then
            echo "Proceeding..."
        else
            echo "Aborting."
            exit 1
        fi

      - |
        read -s -p "Password: " PULUMI_CONFIG_PASSPHRASE
        echo
        export PULUMI_CONFIG_PASSPHRASE
        cd pulumi/ && pulumi stack output kubeconfig --show-secrets > ~/.kube/config

  deploy:
    silent: true
    cmds:
      - bash scripts/deploy-$PLATFORM.sh

  destroy:
    silent: true
    cmds:
      - bash scripts/destroy-$PLATFORM.sh

  refresh:
    silent: true
    cmds:
      - bash scripts/refresh-$PLATFORM.sh

  status:
    silent: true
    cmds:
      - |
        curl -s -o /dev/null -w "%{http_code}" \
          http://$(kubectl get services -n turnkey-status -o json | jq -r '.items[0].status.loadBalancer.ingress[0].ip') \
        | grep 200 && CODE=$? exit $CODE
  access:kargo:
    silent: true
    cmds:
      - kubectl port-forward svc/kargo-api -n kargo 8888:443
  access:argo:
    silent: true
    cmds:
      - kubectl port-forward svc/argocd-server -n argocd 8989:443
  access:tekton:
    silent: true
    cmds:
      - kubectl port-forward -n tekton-pipelines svc/tekton-dashboard 9097:9097
  secrets:argocd:
    silent: true
    cmds:
      - kubectl get secret argocd-initial-admin-secret -n argocd -o jsonpath='{.data.password}' | base64 -d
  login:argocd:
    cmds:
      - |
        argocd login localhost:8989 --insecure \
          --username admin \
          --password $(kubectl get secret argocd-initial-admin-secret -n argocd -o jsonpath='{.data.password}' | base64 -d)

  secrets:argocd-repo:
    desc: Create the ArgoCD repository credential for private stllr-infra access
    silent: true
    cmds:
      - |
        echo "Opening GitHub — create a classic PAT with 'repo' scope (read-only is enough)."
        echo "The scope and description are pre-filled."
        echo ""
        xdg-open "https://github.com/settings/tokens/new?description=stllr-argocd-repo&scopes=repo" 2>/dev/null &
        sleep 2
        read -p  "GitHub username:    " GH_USER
        read -s  -p "Personal access token: " GH_TOKEN
        echo ""
        if [ -z "$GH_USER" ] || [ -z "$GH_TOKEN" ]; then
          echo "Error: both values are required." >&2
          exit 1
        fi
        kubectl create secret generic stllr-infra-repo \
          -n argocd \
          --from-literal=type=git \
          --from-literal=url=https://github.com/EpykLab/stllr-infra \
          --from-literal=username="$GH_USER" \
          --from-literal=password="$GH_TOKEN" \
          --save-config --dry-run=client -o yaml \
        | kubectl label --local -f - argocd.argoproj.io/secret-type=repository --dry-run=client -o yaml \
        | kubectl apply -f -
        echo "Done. ArgoCD will now be able to pull from EpykLab/stllr-infra."

  secrets:kargo-git:
    desc: Create the Kargo git credential for committing image tag updates to stllr-infra
    silent: true
    cmds:
      - |
        echo "Opening GitHub — create a classic PAT with 'repo' scope (read + write)."
        echo "Kargo needs push access to commit promoted image tags."
        echo ""
        xdg-open "https://github.com/settings/tokens/new?description=stllr-kargo-git&scopes=repo" 2>/dev/null &
        sleep 2
        read -p  "GitHub username:       " GH_USER
        read -s  -p "Personal access token: " GH_TOKEN
        echo ""
        if [ -z "$GH_USER" ] || [ -z "$GH_TOKEN" ]; then
          echo "Error: both values are required." >&2
          exit 1
        fi
        kubectl create secret generic stllr-infra-git \
          -n stllr \
          --from-literal=type=https \
          --from-literal=url=https://github.com/EpykLab/stllr-infra \
          --from-literal=username="$GH_USER" \
          --from-literal=password="$GH_TOKEN" \
          --save-config --dry-run=client -o yaml \
        | kubectl label --local -f - kargo.akuity.io/cred-type=repository --dry-run=client -o yaml \
        | kubectl apply -f -
        echo "Done. Kargo can now commit promoted image tags to EpykLab/stllr-infra."

  secrets:kargo-ghcr:
    desc: Create the Kargo image registry credential for discovering new ghcr.io image tags
    silent: true
    cmds:
      - |
        echo "Opening GitHub — create a classic PAT with 'read:packages' scope."
        echo "Kargo needs this to poll ghcr.io for new image tags."
        echo ""
        xdg-open "https://github.com/settings/tokens/new?description=stllr-kargo-ghcr&scopes=read%3Apackages" 2>/dev/null &
        sleep 2
        read -p  "GitHub username:       " GH_USER
        read -s  -p "Personal access token: " GH_TOKEN
        echo ""
        if [ -z "$GH_USER" ] || [ -z "$GH_TOKEN" ]; then
          echo "Error: both values are required." >&2
          exit 1
        fi
        # Kargo v1.9+ expects Opaque secrets with repoURL/username/password fields.
        # repoURL matching is exact by default; repoURLIsRegex=true enables regex matching
        # so one credential covers all images under ghcr.io/epyklab/.
        kubectl create secret generic ghcr-credentials \
          -n stllr \
          --from-literal=repoURL="^ghcr\\.io/epyklab/" \
          --from-literal=repoURLIsRegex="true" \
          --from-literal=username="$GH_USER" \
          --from-literal=password="$GH_TOKEN" \
          --save-config --dry-run=client -o yaml \
        | kubectl label --local -f - kargo.akuity.io/cred-type=image --dry-run=client -o yaml \
        | kubectl apply -f -
        echo "Done. Kargo can now discover new image tags in ghcr.io/epyklab."

  secrets:stllr-stages-verify:
    desc: Check ExternalSecret and tenant-secrets for Kargo stage namespaces (app runtime secrets, not Kargo git/ghcr)
    cmds:
      - |
        set -e
        NS_LIST="${STAGE_NS:-stllr-preview stllr-staging}"
        echo "Checking namespaces: $NS_LIST"
        echo "(Set STAGE_NS='ns1 ns2' to override, e.g. tenant-hello-preview tenant-hello-staging)"
        echo ""
        for ns in $NS_LIST; do
          echo "=== namespace: $ns ==="
          if ! kubectl get namespace "$ns" &>/dev/null; then
            echo "  SKIP: namespace does not exist yet (Argo CD may not have synced)."
            echo ""
            continue
          fi
          if kubectl get externalsecret tenant-secrets -n "$ns" &>/dev/null; then
            kubectl get externalsecret tenant-secrets -n "$ns" -o wide
            kubectl get secret tenant-secrets -n "$ns" &>/dev/null && echo "  tenant-secrets Secret: present" || echo "  tenant-secrets Secret: MISSING (ESO not synced?)"
          else
            echo "  No ExternalSecret tenant-secrets (hello-placeholder-only namespace, or chart not deployed yet)."
          fi
          echo ""
        done
        echo "1Password / AKV item names follow stllr-<namespace> (e.g. stllr-stllr-preview). Create via: cd stllr-infra && task secrets:tenant"

  secrets:1password-connect-creds:
    desc: Seed 1Password Connect server credentials into the cluster (required before enabling onePassword in chart)
    silent: true
    cmds:
      - |
        echo "Paste the contents of your 1password-credentials.json file."
        echo "(Download from 1Password.com → Integrations → Connect → your server → Save Credentials File)"
        echo ""
        read -p "Path to 1password-credentials.json (or press Enter to paste inline): " CREDS_PATH
        echo ""

        if [ -n "$CREDS_PATH" ]; then
          if [ ! -f "$CREDS_PATH" ]; then
            echo "Error: file not found: $CREDS_PATH" >&2
            exit 1
          fi
          CREDS_JSON=$(cat "$CREDS_PATH")
        else
          echo "Paste JSON content and press Ctrl+D when done:"
          CREDS_JSON=$(cat)
        fi

        if [ -z "$CREDS_JSON" ]; then
          echo "Error: credentials JSON is required." >&2
          exit 1
        fi

        # 1Password Connect server reads the credentials file and base64-decodes it.
        # So the file content stored in the secret must itself be base64-encoded JSON.
        CREDS_B64=$(printf '%s' "$CREDS_JSON" | base64 -w 0)

        kubectl create namespace onepassword-connect --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic op-credentials \
          -n onepassword-connect \
          --from-literal=1password-credentials.json="$CREDS_B64" \
          --save-config \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "Done. Verify with: kubectl get secret op-credentials -n onepassword-connect"

  secrets:eso-1password:
    desc: Create the onepassword-connect-token Secret for ESO 1Password Connect auth
    silent: true
    cmds:
      - |
        echo "How would you like to provide the Connect token?"
        echo "  1) Generate via op CLI (op connect token create)"
        echo "  2) Paste an existing token"
        read -p "Choose [1/2]: " TOKEN_CHOICE
        echo ""

        if [[ "$TOKEN_CHOICE" == "1" ]]; then
          if ! command -v op &>/dev/null; then
            echo "Error: op CLI not found. Install from https://developer.1password.com/docs/cli/get-started/"
            exit 1
          fi
          read -p "Connect server name (as shown in op connect server list): " OP_SERVER
          read -p "Vault name to scope the token to: " OP_VAULT
          read -p "Token label (e.g. eso-turnkey-dev): " OP_LABEL
          if [ -z "$OP_SERVER" ] || [ -z "$OP_VAULT" ] || [ -z "$OP_LABEL" ]; then
            echo "Error: all fields are required." >&2
            exit 1
          fi
          OP_TOKEN=$(op connect token create "$OP_LABEL" --server "$OP_SERVER" --vault "$OP_VAULT")
          if [ -z "$OP_TOKEN" ]; then
            echo "Error: token generation failed." >&2
            exit 1
          fi
          echo "Token generated."
        elif [[ "$TOKEN_CHOICE" == "2" ]]; then
          read -s -p "1Password Connect token: " OP_TOKEN
          echo ""
          if [ -z "$OP_TOKEN" ]; then
            echo "Error: token is required." >&2
            exit 1
          fi
        else
          echo "Error: choose 1 or 2." >&2
          exit 1
        fi

        kubectl create secret generic onepassword-connect-token \
          -n external-secrets \
          --from-literal=token="$OP_TOKEN" \
          --save-config \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "Done. Verify with: kubectl get secret onepassword-connect-token -n external-secrets"

  secrets:eso-doppler:
    desc: Create the doppler-eso-token Secret for ESO Doppler provider auth
    silent: true
    cmds:
      - |
        echo "Create a Doppler service token scoped to the project + config ESO will read from."
        echo "Dashboard → Project → your-project → Access → Service Tokens → Generate."
        echo ""
        read -s -p "Doppler service token (dp.st.*): " DOPPLER_TOKEN
        echo ""
        if [ -z "$DOPPLER_TOKEN" ]; then
          echo "Error: token is required." >&2
          exit 1
        fi
        kubectl create secret generic doppler-eso-token \
          -n external-secrets \
          --from-literal=serviceToken="$DOPPLER_TOKEN" \
          --save-config \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "Done. Verify with: kubectl get secret doppler-eso-token -n external-secrets"

  secrets:eso-akv:
    desc: Create the azure-keyvault-credentials Secret for ESO ServicePrincipal auth (non-AKS clusters)
    silent: true
    cmds:
      - |
        read -p "Azure Client ID (App ID): " CLIENT_ID
        read -s -p "Azure Client Secret:      " CLIENT_SECRET
        echo ""
        if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ]; then
          echo "Error: both values are required." >&2
          exit 1
        fi
        kubectl create secret generic azure-keyvault-credentials \
          -n external-secrets \
          --from-literal=client-id="$CLIENT_ID" \
          --from-literal=client-secret="$CLIENT_SECRET" \
          --save-config \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "Done. Verify with: kubectl get secret azure-keyvault-credentials -n external-secrets"
