{{- if .Values.statusPage.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: turnkey-status-page
  namespace: argocd
  annotations:
    # After Kyverno and policies (waves 5 / 25); surfaces only when the rest of the platform is in place.
    argocd.argoproj.io/sync-wave: "100"
spec:
  project: default
  source:
    repoURL: {{ .Values.argocd.repoUrl | quote }}
    path: deploy/status-page
    targetRevision: {{ .Values.argocd.targetRevision | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: turnkey-status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
