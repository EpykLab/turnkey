# Install the Doppler Kubernetes Operator (manages Doppler secrets via DopplerSecret CRD)
# Based on: https://github.com/DopplerHQ/kubernetes-operator/releases/latest/download/recommended.yaml
# NOTE: The doppler-operator-system namespace is created in platform-namespaces.yaml
# to avoid ArgoCD "RepeatedResourceWarning"
{{- if .Values.doppler.enabled }}
---
# CRD: DopplerSecret - the operator watches these resources
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dopplersecrets.secrets.doppler.com
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # CRDs should be synced before the operator
    argocd.argoproj.io/sync-options: Replace=true
    controller-gen.kubebuilder.io/version: v0.17.1
spec:
  group: secrets.doppler.com
  names:
    kind: DopplerSecret
    listKind: DopplerSecretList
    plural: dopplersecrets
    singular: dopplersecret
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: DopplerSecret is the Schema for the dopplersecrets API
          type: object
          properties:
            apiVersion:
              description: APIVersion defines the versioned schema of this representation of an object
              type: string
            kind:
              description: Kind is a string value representing the REST resource this object represents
              type: string
            metadata:
              type: object
            spec:
              description: DopplerSecretSpec defines the desired state of DopplerSecret
              type: object
              properties:
                config:
                  description: The Doppler config
                  type: string
                project:
                  description: The Doppler project
                  type: string
                managedSecret:
                  description: The Kubernetes secret where the operator will store and sync the fetched secrets
                  type: object
                  properties:
                    name:
                      description: The name of the Secret resource
                      type: string
                    namespace:
                      description: Namespace of the resource being referred to
                      type: string
                tokenSecret:
                  description: The Kubernetes secret containing a Doppler service token
                  type: object
                  properties:
                    name:
                      description: The name of the Secret resource
                      type: string
                    namespace:
                      description: Namespace of the resource being referred to
                      type: string
                resyncSeconds:
                  description: The number of seconds to wait between resyncs
                  type: integer
                  default: 60
            status:
              description: DopplerSecretStatus defines the observed state of DopplerSecret
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
      subresources:
        status: {}
---
# ServiceAccount for the operator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: doppler-operator-controller-manager
  namespace: {{ .Values.doppler.operatorNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
# Leader election Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: doppler-operator-leader-election-role
  namespace: {{ .Values.doppler.operatorNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
# ClusterRole for the operator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: doppler-operator-manager-role
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "list", "update", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "update", "watch"]
  - apiGroups: ["secrets.doppler.com"]
    resources: ["dopplersecrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["secrets.doppler.com"]
    resources: ["dopplersecrets/finalizers"]
    verbs: ["update"]
  - apiGroups: ["secrets.doppler.com"]
    resources: ["dopplersecrets/status"]
    verbs: ["get", "patch", "update"]
---
# RoleBinding for leader election
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: doppler-operator-leader-election-rolebinding
  namespace: {{ .Values.doppler.operatorNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: doppler-operator-leader-election-role
subjects:
  - kind: ServiceAccount
    name: doppler-operator-controller-manager
    namespace: {{ .Values.doppler.operatorNamespace }}
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: doppler-operator-manager-rolebinding
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: doppler-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: doppler-operator-controller-manager
    namespace: {{ .Values.doppler.operatorNamespace }}
---
# ConfigMap for operator configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: doppler-operator-manager-config
  namespace: {{ .Values.doppler.operatorNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  controller_manager_config.yaml: |
    apiVersion: controller-runtime.sigs.k8s.io/v1alpha1
    kind: ControllerManagerConfig
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: 127.0.0.1:8080
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: f39fa519.doppler.com
---
# Secret containing the Doppler service token
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.doppler.serviceTokenSecretName }}
  namespace: {{ .Values.doppler.operatorNamespace }}
  annotations:
    # This is a placeholder - users should replace this with their actual token via:
    # - SealedSecret
    # - External Secrets Operator  
    # - Manual secret creation
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  serviceToken: {{ .Values.doppler.serviceToken | default "CHANGEME" | quote }}
---
# DopplerSecret CR that configures which secrets to sync
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: {{ .Values.doppler.project }}-{{ .Values.doppler.config }}
  namespace: {{ .Values.doppler.operatorNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  tokenSecret:
    name: {{ .Values.doppler.serviceTokenSecretName }}
    namespace: {{ .Values.doppler.operatorNamespace }}
  project: {{ .Values.doppler.project }}
  config: {{ .Values.doppler.config }}
  managedSecret:
    name: {{ .Values.doppler.targetSecretName }}
    namespace: {{ .Values.doppler.targetNamespace }}
  resyncSeconds: 60
---
# Doppler operator deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doppler-operator-controller-manager
  namespace: {{ .Values.doppler.operatorNamespace }}
  labels:
    control-plane: controller-manager
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: doppler-operator-controller-manager
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: dopplerhq/kubernetes-operator:1.7.1
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=127.0.0.1:8080
            - --leader-elect
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - NET_RAW
            privileged: false
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: manager-config
              mountPath: /controller_manager_config.yaml
              subPath: controller_manager_config.yaml
      volumes:
        - name: manager-config
          configMap:
            name: doppler-operator-manager-config
{{- end }}
