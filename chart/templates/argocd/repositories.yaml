# ArgoCD Repository configuration for OCI Helm registries
# This allows ArgoCD to pull Helm charts from OCI registries like ghcr.io
{{- if .Values.kargo.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: kargo-oci-repository
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  url: ghcr.io/akuity/kargo-charts
  name: kargo-charts
  type: helm
  enableOCI: "true"
---
{{- end }}
