# FedRAMP SI-4: Falco Runtime Security
# ArgoCD Application for deploying Falco with custom FedRAMP rules
apiVersion: v1
kind: Namespace
metadata:
  name: turnkey-compliance
  labels:
    app.kubernetes.io/name: turnkey-compliance
    app.kubernetes.io/component: runtime-security
---
# ConfigMap for Falco configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-config
  namespace: turnkey-compliance
data:
  # Custom Falco configuration
  falco.yaml: |
    # SI-4: Alert on security events
    priority: warning
    json_output: true
    json_include_output_property: true
    
    # SI-4(2): Automated tools for real-time analysis
    rules_file:
      - /etc/falco/falco_rules.yaml
      - /etc/falco/falco_rules.local.yaml
      - /etc/falco/rules.d/fedramp-si4-rules.yaml
    
    # SI-4(5): System-generated alerts
    # Configure to send alerts to SIEM
    http_output:
      enabled: true
      url: http://falcosidekick:2801
    
    # Program output for custom alerting
    program_output:
      enabled: false
    
    # File output for local retention (AU-9)
    file_output:
      enabled: true
      filename: /var/log/falco/events.log
      keep_alive: false
    
    # Syslog output for centralized logging
    syslog_output:
      enabled: false
