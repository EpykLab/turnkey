{{- if .Values.kyverno.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: turnkey-kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: platform
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: "3.3.5"
    helm:
      # Avoid kubectl apply last-applied-configuration bloat on huge Kyverno CRDs (Argo CD).
      values: |
        crds:
          annotations:
            argocd.argoproj.io/sync-options: Replace=true
        # Post-upgrade Job uses bitnami/kubectl; optional hook is unnecessary for greenfield installs and can fail image pulls.
        policyReportsCleanup:
          enabled: false
        features:
          policyExceptions:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      # Large Kyverno CRDs + SSA can exceed annotation size limits on the API server.
      - ServerSideApply=false
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: turnkey-kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: platform
  source:
    repoURL: {{ .Values.argocd.repoUrl | quote }}
    path: policies
    targetRevision: {{ .Values.argocd.targetRevision | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=false
{{- end }}
