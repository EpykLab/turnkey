global:
  provider: doks
  environment: dev

# DOKS ships with a working CNI; replacing it with Cilium is a separate hardening step.
cilium:
  enabled: false
  doksCompatibilityMode: true

ingressNginx:
  enabled: true
  helmValues:
    controller:
      admissionWebhooks:
        enabled: false
      service:
        type: LoadBalancer

certManager:
  enabled: true

# Controller only until ClusterSecretStore/SecretStore is GitOps'd; no backend required for install.
# NOTE: Disabled due to CRD annotation size limit (262144 bytes) - re-enable when fixed
externalSecrets:
  enabled: false

# Gateway API controller + TLS not installed in baseline smoke test.
caddyGateway:
  enabled: false
  hostname: turnkey.stellarbridge.app

otel:
  enabled: true
  devMode: false

doppler:
  enabled: true
  config: dev

tekton:
  enabled: true
  dashboard:
    enabled: false

kargo:
  enabled: true

statusPage:
  enabled: true

# CIS-style checks (same as kind overlay; interpret results on DOKS as closer to prod).
kubeBench:
  enabled: true

# Optional chaos tooling; same defaults as kind (off until you enable).
chaosMesh:
  enabled: false
  namespace: chaos-mesh
  targetRevision: "2.7.3"
  helmValues:
    dashboard:
      securityMode: false

# Hello tiers (repeat full apps list: later value files replace the whole helloPlaceholder map in Helm).
helloPlaceholder:
  enabled: true
  repoURL: ""
  targetRevision: ""
  apps:
    - name: stllr-preview
      path: deploy/hello-placeholder/overlays/preview
      namespace: tenant-hello-preview
      kargoAuthorizedStage: "stllr:preview"
    - name: stllr-staging
      path: deploy/hello-placeholder/overlays/staging
      namespace: tenant-hello-staging
      kargoAuthorizedStage: "stllr:staging"
    - name: stllr-prod
      path: deploy/hello-placeholder/overlays/prod
      namespace: tenant-hello-prod
      kargoAuthorizedStage: "stllr:prod"

# ============================================================================
# FedRAMP Security Controls - ALL ENABLED FOR TESTING
# ============================================================================

# FedRAMP AU-2/AU-9: Audit and Accountability
# Vector log collection with S3 immutable storage and SIEM forwarding
vector:
  enabled: true
  namespace: turnkey-compliance
  targetRevision: "0.54.0"
  s3:
    enabled: false  # S3 requires actual bucket configuration
    bucket: "fedramp-audit-logs"
    region: "us-east-1"
    prefix: "audit"
    objectLock: true  # AU-9: Enable Object Lock for 7-year retention
  siem:
    enabled: false  # SIEM requires actual endpoint configuration
    endpoint: ""  # SIEM endpoint (e.g., Splunk HEC, HTTP endpoint)
    token: ""     # SIEM authentication token

# FedRAMP SC-7: Boundary Protection  
# NetworkPolicy enforcement for namespace isolation
# Now includes specific allow rules for ArgoCD namespace and default-deny for workload namespaces
fedramp:
  networkPolicies:
    enabled: true  # Re-enabled with proper namespace-aware rules
  # SC-8 Transmission Confidentiality baseline: Linkerd mTLS for pod-to-pod traffic
  mtls:
    enabled: true  # Requires linkerd.enabled: true
  # Optional: enable when running a validated FIPS crypto profile
  # NOTE: Requires kyverno CRDs - enabled now that kyverno is deployed
  enforceFIPS:
    enabled: false

# FedRAMP SI-4: Information System Monitoring
# Falco runtime security with custom FedRAMP rules
falco:
  enabled: true
  namespace: turnkey-compliance
  targetRevision: "4.20.0"
  siem:
    enabled: false  # SIEM forwarding requires actual endpoint
    endpoint: ""  # Falcosidekick webhook endpoint

# Linkerd Service Mesh baseline for pod-to-pod mTLS
linkerd:
  enabled: true
  namespace: linkerd
  fips:
    enabled: false  # Optional; requires a Linkerd FIPS build
