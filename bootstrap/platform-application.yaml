# Root platform Application (App-of-Apps child). Argo CD clones this repo from GitHub — commit and push
# chart/bootstrap changes before expecting the live cluster to match your working tree.
# For AKS (or other providers), swap the second value file to values.aks.yaml (or add a provider-specific overlay).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: turnkey-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EpykLab/turnkey
    targetRevision: master
    path: chart
    helm:
      valueFiles:
        - values.yaml
        - values.doks.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
