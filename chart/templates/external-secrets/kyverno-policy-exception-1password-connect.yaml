{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.onePassword.enabled }}
# 1Password Connect ships without configurable securityContext or probes via Helm values.
# This PolicyException allows the Connect deployment to run under Kyverno's security policies.
apiVersion: kyverno.io/v2beta1
kind: PolicyException
metadata:
  name: onepassword-connect
  namespace: kyverno
  annotations:
    argocd.argoproj.io/sync-wave: "10"  # before the connect Application at wave 11
    turnkey.io/change-control: {{ .Values.argocd.repoUrl | quote }}
spec:
  exceptions:
    - policyName: disallow-privileged
      ruleNames:
        - autogen-check-privileged
        - check-privileged
    - policyName: require-resources-and-probes
      ruleNames:
        - autogen-require-requests-and-limits
        - require-requests-and-limits
  match:
    any:
      - resources:
          kinds:
            - Deployment
            - Pod
          namespaces:
            - {{ .Values.externalSecrets.onePassword.connect.namespace }}
{{- end }}
