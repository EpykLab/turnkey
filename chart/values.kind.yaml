# Overlay for local kind clusters: no cloud LB, single node, ingress on NodePort.
global:
  provider: kind
  environment: dev
  clusterName: turnkey-kind

cilium:
  enabled: false

ingressNginx:
  enabled: true
  helmValues:
    controller:
      admissionWebhooks:
        enabled: false
      service:
        type: NodePort
        nodePorts:
          http: 30080
          https: 30443

certManager:
  enabled: true

externalSecrets:
  enabled: false

caddyGateway:
  enabled: false

otel:
  enabled: true
  devMode: true

# Fewer moving parts locally; enable when you are exercising Doppler on kind.
doppler:
  enabled: false

tekton:
  enabled: true
  dashboard:
    enabled: true

kargo:
  enabled: true

# LoadBalancer external IP never settles on plain kind; Argo stays Progressing. Re-enable with MetalLB or port-forward-only smoke.
statusPage:
  enabled: false

# CIS-style checks; many hostPath checks reflect node layout (kind nodes differ from production).
kubeBench:
  enabled: true

# Optional chaos tooling; enable to validate wiring. Tune experiments in a later phase.
chaosMesh:
  enabled: false
  namespace: chaos-mesh
  targetRevision: "2.7.3"
  helmValues:
    dashboard:
      securityMode: false

# Hello tiers on kind (must repeat apps here: later value file replaces the whole helloPlaceholder map in Helm).
helloPlaceholder:
  enabled: true
  repoURL: ""
  targetRevision: ""
  apps:
    - name: stllr-preview
      path: deploy/hello-placeholder/overlays/preview
      namespace: tenant-hello-preview
      project: tenant
      kargoAuthorizedStage: "stllr:preview"
    - name: stllr-staging
      path: deploy/hello-placeholder/overlays/staging
      namespace: tenant-hello-staging
      project: tenant
      kargoAuthorizedStage: "stllr:staging"
    - name: stllr-prod
      path: deploy/hello-placeholder/overlays/prod
      namespace: tenant-hello-prod
      project: tenant
      kargoAuthorizedStage: "stllr:prod"
    # stllr-infra: Kargo project, warehouse, and stages for image promotion.
    - name: stllr-kargo-config
      repoURL: https://github.com/EpykLab/stllr-infra
      targetRevision: master
      path: kargo
      namespace: argocd
      project: platform
      syncWave: "56"
    # stllr-infra: ApplicationSet that generates one ArgoCD Application per tenant.
    - name: stllr-tenant-apps
      repoURL: https://github.com/EpykLab/stllr-infra
      targetRevision: master
      path: argocd
      namespace: argocd
      project: platform
      syncWave: "57"
