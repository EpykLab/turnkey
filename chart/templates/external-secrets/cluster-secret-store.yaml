{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.azureKeyVault.vaultUrl }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
  annotations:
    argocd.argoproj.io/sync-wave: "13"  # after ESO installs at wave 12
    turnkey.io/change-control: {{ .Values.argocd.repoUrl | quote }}
spec:
  provider:
    azurekv:
      vaultUrl: {{ .Values.externalSecrets.azureKeyVault.vaultUrl | quote }}
      tenantId: {{ .Values.externalSecrets.azureKeyVault.tenantId | quote }}
      {{- if eq .Values.externalSecrets.azureKeyVault.authType "WorkloadIdentity" }}
      authType: WorkloadIdentity
      {{- else if eq .Values.externalSecrets.azureKeyVault.authType "ServicePrincipal" }}
      authType: ServicePrincipal
      authSecretRef:
        clientId:
          name: {{ .Values.externalSecrets.azureKeyVault.authSecretName }}
          namespace: {{ .Values.externalSecrets.namespace }}
          key: client-id
        clientSecret:
          name: {{ .Values.externalSecrets.azureKeyVault.authSecretName }}
          namespace: {{ .Values.externalSecrets.namespace }}
          key: client-secret
      {{- end }}
{{- end }}
