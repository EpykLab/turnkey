global:
  environment: dev
  clusterName: turnkey-dev
  provider: aks

argocd:
  namespace: argocd
  # repoUrl is the single override point for forks.
  # Set this to your fork's URL in your stack config (stacks/<env>.yaml or Pulumi.<env>.yaml).
  # It controls: ArgoCD Application sources, the platform AppProject's allowed sourceRepos,
  # and the turnkey.io/change-control annotation on Helm-rendered policies.
  repoUrl: https://github.com/EpykLab/turnkey
  targetRevision: master
  path: chart

# Chosen ingress path (see Moving to K8s): nginx Ingress controller. Optional Cilium is for clusters
# where replacing the CNI is intentional; leave off on DOKS/AKS default CNIs.
ingressNginx:
  enabled: true
  namespace: ingress-nginx
  targetRevision: "4.15.1"
  helmValues:
    controller:
      service:
        type: LoadBalancer

certManager:
  enabled: true
  namespace: cert-manager
  targetRevision: "v1.20.1"
  clusterIssuer:
    enabled: true
    name: letsencrypt-cloudflare
    email: platform@stellarbridge.app
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretName: letsencrypt-cloudflare-account-key
    # Supported values:
    # - http01
    # - dns01-cloudflare
    solverType: http01
    http01IngressClass: nginx
    cloudflareApiTokenSecret:
      name: cloudflare-api-token
      key: api-token

externalSecrets:
  enabled: false
  namespace: external-secrets
  targetRevision: "2.0.1"
  helmValues: {}
  # Azure Key Vault ClusterSecretStore — deployed alongside ESO when enabled.
  # Tenants reference this store by name ("azure-keyvault") in their ExternalSecrets.
  azureKeyVault:
    # URL of the Key Vault instance (required when externalSecrets.enabled is true).
    vaultUrl: ""
    # Azure AD tenant ID.
    tenantId: ""
    # Authentication type: WorkloadIdentity (AKS) or ServicePrincipal (any cluster).
    authType: WorkloadIdentity
    # ServicePrincipal only: name of the Secret in externalSecrets.namespace containing
    # client-id and client-secret keys. Create this Secret out-of-band before enabling.
    authSecretName: azure-keyvault-credentials
  # Doppler ClusterSecretStore — cloud-agnostic alternative to AKV (works on DOKS, EKS, etc.).
  # Use instead of azureKeyVault on non-AKS clusters.
  # Create the service token secret first: task secrets:eso-doppler
  doppler:
    enabled: false
    # Name of the Secret in externalSecrets.namespace containing a `serviceToken` key.
    authSecretName: doppler-eso-token
  # 1Password ClusterSecretStore — deploys 1Password Connect into the cluster automatically.
  # Before enabling, seed credentials: task secrets:1password-connect-creds
  # Then seed the ESO access token: task secrets:eso-1password
  onePassword:
    enabled: false
    # Override only if using an external Connect server. When empty, the in-cluster
    # Connect service URL is derived automatically from connect.namespace.
    connectHost: ""
    # Name of the vault in 1Password that holds tenant secrets.
    vaultName: ""
    # Name of the Secret in externalSecrets.namespace containing a `token` key.
    authSecretName: onepassword-connect-token
    connect:
      # Namespace the Connect server is deployed into.
      namespace: onepassword-connect
      targetRevision: "1.15.0"
      # Name of the Secret pre-created by: task secrets:1password-connect-creds
      credentialsSecretName: op-credentials

# CI / promotion (optional). DOKS overlay turns these on for full-stack dev clusters.
tekton:
  enabled: false
  pipeline:
    enabled: true
  triggers:
    enabled: true
  dashboard:
    enabled: false

# OCI Helm chart (ghcr.io/akuity/kargo-charts). Dev-only admin credentials below — replace for real environments.
kargo:
  enabled: false
  namespace: kargo
  targetRevision: "1.9.5"
  helmValues:
    api:
      adminAccount:
        enabled: true
        # Password: turnkey-dev-admin (bcrypt). Rotate via SealedSecret / ExternalSecret in production.
        passwordHash: "$2b$10$yYvVLF/dW8JwA9U96PF/m.Nw2k4KOTPAytmuq.9E4kq4GZzJSa7dW"
        tokenSigningKey: "NaZJng6wz4UCDUo1DGgjHLbfrfmOdQhwGsMgzU5tA8"

cilium:
  enabled: false
  kubeProxyReplacement: true
  hubble:
    enabled: true
  # Note: WireGuard is NOT FIPS 140-2 validated (uses ChaCha20)
  # For FedRAMP SC-8, use Linkerd instead (see below)

# FedRAMP SC-8 baseline: Linkerd Service Mesh (mTLS)
# RECOMMENDED: Lightweight, automatic pod-to-pod encryption
# Optional: install FIPS build when validated crypto is required
# Architecture: Rust-based sidecar proxies (~1ms overhead vs Istio's ~5-10ms)
linkerd:
  enabled: false
  namespace: linkerd
  fips:
    enabled: false  # Optional; requires a Linkerd FIPS build

# FedRAMP Alternative: Istio (only if you need advanced traffic management)
# NOT RECOMMENDED for turnkey: Heavy Envoy sidecars, complex operation
# Use only if you need: Traffic splitting, authz policies, external auth, WASM filters
istio:
  enabled: false
  namespace: istio-system
  rootNamespace: istio-system
  ingressNamespace: istio-ingress
  fips:
    enabled: false  # Requires Istio distroless-fips build

caddyGateway:
  enabled: true
  gatewayClassName: caddy
  gatewayName: public-gateway
  gatewayNamespace: gateway-system
  hostname: turnkey.example.com
  email: platform@stellarbridge.app

kyverno:
  enabled: true
  policyMode:
    imageDigestPinning: Audit
    defaultDenyAbsence: Audit
    namespaceScopedRoles: Audit

doppler:
  # Off until Doppler project + service token are wired; avoids CrashLoop on smoke tests.
  enabled: false
  operatorNamespace: doppler-operator-system
  project: stellarbridge
  config: dev
  serviceTokenSecretName: doppler-service-token
  targetNamespace: turnkey-system
  targetSecretName: turnkey-platform-secrets
  # Service token for Doppler API access - replace in production via SealedSecret/ExternalSecret
  serviceToken: CHANGEME

otel:
  enabled: true
  # When true, export telemetry to debug sink only (no Elastic backend required).
  devMode: false
  namespace: observability
  elasticEndpoint: https://elastic.internal:4317

# Public HTTP status page (LoadBalancer :80) synced last (Argo wave 100) after Kyverno + policies.
statusPage:
  enabled: true

# CIS-oriented checks (aquasecurity/kube-bench). Results are cluster/layout dependent; use for baselines and regression.
kubeBench:
  enabled: false

# Chaos Mesh (optional). Enable for in-cluster chaos experiments after the control plane is stable.
chaosMesh:
  enabled: false
  namespace: chaos-mesh
  targetRevision: "2.7.3"
  helmValues: {}

# ============================================================================
# FedRAMP Security Controls
# ============================================================================

# FedRAMP AU-2/AU-9: Audit and Accountability
# Vector log collection with S3 immutable storage and SIEM forwarding
vector:
  enabled: false
  namespace: turnkey-compliance
  targetRevision: "0.54.0"
  s3:
    enabled: false
    bucket: "fedramp-audit-logs"
    region: "us-east-1"
    prefix: "audit"
    objectLock: true  # AU-9: Enable Object Lock for 7-year retention
  siem:
    enabled: false
    endpoint: ""  # SIEM endpoint (e.g., Splunk HEC, HTTP endpoint)
    token: ""     # SIEM authentication token

# FedRAMP SC-7: Boundary Protection  
# NetworkPolicy enforcement for namespace isolation
fedramp:
  networkPolicies:
    enabled: false  # Enable to deploy default-deny and exception policies
  # SC-8 Transmission Confidentiality baseline: Linkerd pod-to-pod mTLS
  # Requires linkerd.enabled: true
  mtls:
    enabled: false
  # Optional: enable when running a validated FIPS crypto profile
  enforceFIPS:
    enabled: false

# FedRAMP SI-4: Information System Monitoring
# Falco runtime security with custom FedRAMP rules
falco:
  enabled: false
  namespace: turnkey-compliance
  targetRevision: "4.20.0"
  siem:
    enabled: false
    endpoint: ""  # Falcosidekick webhook endpoint

# ============================================================================
# Optional: Argo CD Applications from external repo (e.g., stllr-infra charts).
# Supports both Kargo-managed apps (with kargoAuthorizedStage) and standard ArgoCD apps.
# Set repoURL to stllr-infra to deploy charts from that repo.
# Keep paths in sync with stllr-infra when changing manifests.
helloPlaceholder:
  enabled: false
  repoURL: ""  # Set to "https://github.com/EpykLab/stllr-infra" to pull from infra repo
  targetRevision: ""
  apps:
    # Example: Main app managed by Kargo (has kargoAuthorizedStage)
    - name: stllr-app-preview
      path: charts/stllr-app/overlays/preview
      namespace: stllr-preview
      kargoAuthorizedStage: "stllr:preview"
      syncWave: "55"
    - name: stllr-app-staging
      path: charts/stllr-app/overlays/staging
      namespace: stllr-staging
      kargoAuthorizedStage: "stllr:staging"
      syncWave: "55"
    - name: stllr-app-prod
      path: charts/stllr-app/overlays/prod
      namespace: stllr-prod
      kargoAuthorizedStage: "stllr:prod"
      syncWave: "55"
    # Example: Standard ArgoCD apps (no Kargo stage) for cluster state/config
    - name: cluster-config
      path: charts/cluster-config/base
      namespace: kube-system
      syncWave: "56"  # After main apps
      project: default
    - name: monitoring-rules
      path: charts/monitoring/rules
      namespace: observability
      syncWave: "57"
      project: default
