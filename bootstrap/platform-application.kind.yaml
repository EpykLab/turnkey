# Same as platform-application.yaml but uses values.kind.yaml for local kind clusters.
# Apply after bootstrap if your Git default still points at values.doks.yaml:
#   kubectl apply -f bootstrap/platform-application.kind.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: turnkey-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EpykLab/turnkey
    targetRevision: master
    path: chart
    helm:
      valueFiles:
        - values.yaml
        - values.kind.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
