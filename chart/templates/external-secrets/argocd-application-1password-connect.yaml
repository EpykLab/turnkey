{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.onePassword.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onepassword-connect
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "11"  # before ESO (wave 12) and ClusterSecretStore (wave 13)
spec:
  project: platform
  source:
    repoURL: https://1password.github.io/connect-helm-charts/
    chart: connect
    targetRevision: {{ .Values.externalSecrets.onePassword.connect.targetRevision | quote }}
    helm:
      releaseName: onepassword-connect
      valuesObject:
        connect:
          credentialsName: {{ .Values.externalSecrets.onePassword.connect.credentialsSecretName | quote }}
          credentialsKey: "1password-credentials.json"
          serviceType: ClusterIP
          api:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 250m
                memory: 256Mi
          sync:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.externalSecrets.onePassword.connect.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
{{- end }}
