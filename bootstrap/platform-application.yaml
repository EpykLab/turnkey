apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: turnkey-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EpykLab/turnkey
    targetRevision: main
    path: chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
