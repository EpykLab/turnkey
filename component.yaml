schema_version: 1
component:
  id: 3c914698-ae9f-40f8-a506-093c737e3da3
  name: Turnkey Platform Baseline
  description_markdown: |
    Turnkey is the platform baseline for provisioning and bootstrapping Kubernetes
    clusters with Pulumi and Argo CD. It provides a comprehensive, security-hardened
    foundation for deploying containerized workloads with SOC 2, HIPAA, and FedRAMP
    compliance capabilities.

    The platform includes automated cluster provisioning (AKS, DOKS), GitOps-based
    deployment orchestration, certificate management, ingress handling, policy
    enforcement, CI/CD pipelines, secrets management, observability, and extensive
    security controls including FedRAMP SC-8 mTLS, SC-7 boundary protection,
    AU-2/AU-9 audit logging, and SI-4 runtime monitoring.

    Key Features:
    - **Cluster Provisioning**: Pulumi-based infrastructure-as-code for AKS/DOKS
    - **GitOps**: ArgoCD with app-of-apps pattern and Kargo promotion management
    - **Security**: Kyverno policies, NetworkPolicies, Falco runtime security
    - **FedRAMP**: FIPS 140-2 validated mTLS, audit logging, boundary protection
    - **Observability**: OpenTelemetry, Vector audit collection, health endpoints
    - **CI/CD**: Tekton pipelines with webhook triggers
    - **Secrets**: Doppler integration with automatic synchronization
    - **Compliance**: kube-bench CIS scanning, chaos engineering capabilities
