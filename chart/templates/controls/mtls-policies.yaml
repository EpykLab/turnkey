# FedRAMP SC-8: Transmission Confidentiality
# FIPS 140-2 Validated Cryptography ONLY
# 
# IMPORTANT: FedRAMP requires FIPS 140-2 validated cryptographic modules.
# WireGuard is NOT FIPS 140-2 validated (uses ChaCha20-Poly1305).
#
# RECOMMENDED ARCHITECTURE FOR TURNKEY:
# Linkerd Service Mesh with FIPS 140-2 build
# - Uses BoringSSL-FIPS (Certificate #2964)
# - AES-GCM encryption (128, 256-bit) - FIPS approved
# - ECDSA with P-256, P-384 curves - FIPS approved
# - SHA-256, SHA-384 hashing - FIPS approved
# - Automatic mTLS with sidecar injection
# - Low overhead (~1ms vs Istio's ~5-10ms)
#
# Installation: https://linkerd.io/2.15/features/fips/

# ============================================================================
# Linkerd with FIPS 140-2 (RECOMMENDED)
# ============================================================================
{{- if and .Values.linkerd.enabled .Values.linkerd.fips.enabled }}
---
# SC-8(1): Document FIPS 140-2 compliance
apiVersion: v1
kind: ConfigMap
metadata:
  name: fedramp-sc8-linkerd-fips
  namespace: linkerd
  labels:
    fedramp.turnkey.io/control: "SC-8"
    fedramp.turnkey.io/fips-140-2: "validated"
    app.kubernetes.io/part-of: "turnkey-fedramp"
data:
  compliance: |
    SC-8 Implementation: Linkerd Service Mesh with FIPS 140-2 validated crypto
    
    FIPS 140-2 Module: BoringSSL-FIPS (Certificate #2964)
    Encryption: TLS 1.2+ with FIPS-approved cipher suites
    Algorithms:
      - Key Exchange: ECDHE with P-256, P-384
      - Authentication: ECDSA with P-256, P-384
      - Encryption: AES-256-GCM, AES-128-GCM
      - Hashing: SHA-256, SHA-384
    
    Certificate Authority: Linkerd identity with FIPS-validated key generation
    Scope: All meshed services
    
    FedRAMP Compliance:
    - SC-8(1): FIPS 140-2 validated cryptographic protection
    - SC-8(2): End-to-end encryption between services
    - SC-13: Cryptographic protection (FIPS 140-2)
    
    Evidence:
    - linkerd check shows mTLS is enabled
    - linkerd-identity CA certificates (FIPS-compliant)
    - linkerd-proxy logs showing TLS handshake with FIPS suites
---
# Kyverno policy to enforce Linkerd injection
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: fedramp-sc8-require-linkerd-mesh
  annotations:
    turnkey.io/change-control: {{ .Values.argocd.repoUrl | quote }}
    policies.kyverno.io/title: Require Linkerd Mesh for SC-8
    policies.kyverno.io/category: FedRAMP SC-8
    policies.kyverno.io/subject: Deployment,StatefulSet,DaemonSet
    policies.kyverno.io/description: >-
      Requires Linkerd sidecar injection for FIPS 140-2 mTLS in FedRAMP namespaces.
      This ensures all inter-service traffic is encrypted with validated cryptography.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-linkerd-injection
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
              namespaceSelector:
                matchLabels:
                  fedramp.turnkey.io/mtls-required: "true"
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - linkerd
                - linkerd-viz
                - kyverno
                - argocd
      validate:
        message: "Workload must have Linkerd injection enabled for SC-8 FIPS 140-2 mTLS compliance"
        pattern:
          spec:
            template:
              metadata:
                annotations:
                  linkerd.io/inject: "enabled"
{{- end }}


# ============================================================================
# Kyverno Policy: Enforce FIPS 140-2 Cipher Suites
# ============================================================================
# This policy blocks non-FIPS ciphers (ChaCha20, RC4, DES, etc.)
{{- if .Values.fedramp.enforceFIPS.enabled }}
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: fedramp-sc8-enforce-fips-ciphers
  annotations:
    turnkey.io/change-control: {{ .Values.argocd.repoUrl | quote }}
    argocd.argoproj.io/sync-wave: "26"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    policies.kyverno.io/title: Enforce FIPS 140-2 Cipher Suites
    policies.kyverno.io/category: FedRAMP SC-8,SC-13
    policies.kyverno.io/subject: Ingress,Gateway
    policies.kyverno.io/description: >-
      Enforces that TLS configurations use only FIPS 140-2 approved cipher suites.
      Blocks non-compliant ciphers like ChaCha20, RC4, DES, MD5, SHA-1.
      This is required for FedRAMP compliance (SC-8, SC-13).
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-fips-approved-ciphers
      match:
        any:
          - resources:
              kinds:
                - Ingress
              annotations:
                nginx.ingress.kubernetes.io/ssl-ciphers: "?*"
      validate:
        message: "Ingress must use FIPS 140-2 approved cipher suites only. Forbidden: ChaCha20, RC4, DES, MD5, SHA-1"
        deny:
          conditions:
            any:
              - key: "{{ "{{" }} request.object.metadata.annotations.\"nginx.ingress.kubernetes.io/ssl-ciphers\" {{ "}}" }}"
                operator: AnyIn
                value:
                  - "*CHACHA*"
                  - "*RC4*"
                  - "*DES*"
                  - "*MD5*"
                  - "*SHA1*"
---
# Kyverno policy to block non-FIPS ingress annotations
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: fedramp-sc8-block-non-fips-ciphers
  annotations:
    turnkey.io/change-control: {{ .Values.argocd.repoUrl | quote }}
    argocd.argoproj.io/sync-wave: "26"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    policies.kyverno.io/title: Block Non-FIPS TLS Configuration
    policies.kyverno.io/category: FedRAMP SC-8
    policies.kyverno.io/subject: Ingress
    policies.kyverno.io/description: >-
      Blocks Ingress resources that explicitly configure non-FIPS 140-2 cipher suites.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: block-deprecated-protocols
      match:
        any:
          - resources:
              kinds:
                - Ingress
              annotations:
                nginx.ingress.kubernetes.io/ssl-protocols: "?*"
      validate:
        message: "TLS 1.0 and 1.1 are prohibited by FedRAMP. Use TLS 1.2+ only."
        deny:
          conditions:
            any:
              - key: "{{ "{{" }} request.object.metadata.annotations.\"nginx.ingress.kubernetes.io/ssl-protocols\" {{ "}}" }}"
                operator: AnyIn
                value:
                  - "TLSv1"
                  - "TLSv1.0"
                  - "TLSv1.1"
{{- end }}
