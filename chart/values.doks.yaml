global:
  provider: doks
  environment: dev

# DOKS ships with a working CNI; replacing it with Cilium is a separate hardening step.
cilium:
  enabled: false
  doksCompatibilityMode: true

ingressNginx:
  enabled: true
  helmValues:
    controller:
      admissionWebhooks:
        enabled: false
      service:
        type: LoadBalancer

certManager:
  enabled: true

# Controller only until ClusterSecretStore/SecretStore is GitOps'd; no backend required for install.
# NOTE: Disabled due to CRD annotation size limit (262144 bytes) - re-enable when fixed
externalSecrets:
  enabled: false

# Gateway API controller + TLS not installed in baseline smoke test.
caddyGateway:
  enabled: false
  hostname: turnkey.stellarbridge.app

otel:
  enabled: true
  devMode: true

doppler:
  enabled: true
  config: dev

tekton:
  enabled: true

kargo:
  enabled: true

statusPage:
  enabled: true
