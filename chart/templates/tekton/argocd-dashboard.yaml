{{- if and .Values.tekton.enabled .Values.tekton.dashboard.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: turnkey-tekton-dashboard
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "34"
spec:
  project: platform
  source:
    repoURL: {{ .Values.argocd.repoUrl | quote }}
    targetRevision: {{ .Values.argocd.targetRevision | quote }}
    path: deploy/tekton-dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
{{- end }}