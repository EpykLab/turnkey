global:
  provider: doks
  environment: dev

# DOKS ships with a working CNI; replacing it with Cilium is a separate hardening step.
cilium:
  enabled: false
  doksCompatibilityMode: true

# Service mesh mTLS baseline for DOKS.
# FIPS is optional and can be enabled later when needed.
linkerd:
  enabled: true
  fips:
    enabled: false

fedramp:
  mtls:
    enabled: true

ingressNginx:
  enabled: true
  helmValues:
    controller:
      admissionWebhooks:
        enabled: false
      service:
        type: LoadBalancer

certManager:
  enabled: true

# Controller only until ClusterSecretStore/SecretStore is GitOps'd; no backend required for install.
# NOTE: Disabled due to CRD annotation size limit (262144 bytes) - re-enable when fixed
externalSecrets:
  enabled: false
  azureKeyVault:
      vaultUrl: https://your-vault-name.vault.azure.net
      tenantId: your-azure-tenant-id
      authType: WorkloadIdentity   # AKS with managed identity
      # authType: ServicePrincipal  # DOKS or any non-AKS cluster

# Gateway API controller + TLS not installed in baseline smoke test.
caddyGateway:
  enabled: false
  hostname: turnkey.stellarbridge.app

otel:
  enabled: true
  devMode: true

doppler:
  enabled: true
  config: dev

tekton:
  enabled: true
  dashboard:
    enabled: true

kargo:
  enabled: true

statusPage:
  enabled: true

# CIS-style checks (same as kind overlay; interpret results on DOKS as closer to prod).
kubeBench:
  enabled: true

# Optional chaos tooling; same defaults as kind (off until you enable).
chaosMesh:
  enabled: false
  namespace: chaos-mesh
  targetRevision: "2.7.3"
  helmValues:
    dashboard:
      securityMode: false

# Hello tiers (repeat full apps list: later value files replace the whole helloPlaceholder map in Helm).
helloPlaceholder:
  enabled: true
  repoURL: ""
  targetRevision: ""
  apps:
    - name: stllr-preview
      path: deploy/hello-placeholder/overlays/preview
      namespace: tenant-hello-preview
      project: tenant
      kargoAuthorizedStage: "stllr:preview"
    - name: stllr-staging
      path: deploy/hello-placeholder/overlays/staging
      namespace: tenant-hello-staging
      project: tenant
      kargoAuthorizedStage: "stllr:staging"
    - name: stllr-prod
      path: deploy/hello-placeholder/overlays/prod
      namespace: tenant-hello-prod
      project: tenant
      kargoAuthorizedStage: "stllr:prod"
    # stllr-infra: Kargo project, warehouse, and stages for image promotion.
    - name: stllr-kargo-config
      repoURL: https://github.com/EpykLab/stllr-infra
      targetRevision: master
      path: kargo
      namespace: argocd
      project: platform
      syncWave: "56"
    # stllr-infra: ApplicationSet that generates one ArgoCD Application per tenant.
    - name: stllr-tenant-apps
      repoURL: https://github.com/EpykLab/stllr-infra
      targetRevision: master
      path: argocd
      namespace: argocd
      project: platform
      syncWave: "57"
