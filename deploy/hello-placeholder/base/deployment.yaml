# Placeholder tenant workload for GitOps / Kargo wiring. Namespace set by overlay.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-placeholder
  labels:
    app.kubernetes.io/name: hello-placeholder
    app.kubernetes.io/component: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-placeholder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-placeholder
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            privileged: false
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
