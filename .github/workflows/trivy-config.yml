name: Trivy config

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  trivy-config:
    name: Helm / Kubernetes misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy config
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          trivy-config: trivy.yaml
          exit-code: "1"
