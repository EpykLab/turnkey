{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.doppler.enabled }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: doppler
  annotations:
    argocd.argoproj.io/sync-wave: "13"  # after ESO installs at wave 12
    turnkey.io/change-control: {{ .Values.argocd.repoUrl | quote }}
spec:
  provider:
    doppler:
      auth:
        secretRef:
          dopplerToken:
            name: {{ .Values.externalSecrets.doppler.authSecretName }}
            namespace: {{ .Values.externalSecrets.namespace }}
            key: serviceToken
{{- end }}
