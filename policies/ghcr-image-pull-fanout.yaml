apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-generate-tenant-ghcr-image-pull-secret
  annotations:
    turnkey.io/change-control: "https://github.com/EpykLab/turnkey"
rules:
  - apiGroups: [""]
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-generate-tenant-ghcr-image-pull-secret
  annotations:
    turnkey.io/change-control: "https://github.com/EpykLab/turnkey"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-generate-tenant-ghcr-image-pull-secret
subjects:
  - kind: ServiceAccount
    name: kyverno-admission-controller
    namespace: kyverno
  - kind: ServiceAccount
    name: kyverno-background-controller
    namespace: kyverno
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-tenant-ghcr-image-pull-secret
  annotations:
    turnkey.io/change-control: "https://github.com/EpykLab/turnkey"
spec:
  background: true
  rules:
    - name: clone-ghcr-credentials-into-tenant-namespaces
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - tenant-*
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: v1
        kind: Secret
        name: ghcr-credentials
        namespace: "{{ request.object.metadata.name }}"
        clone:
          namespace: stllr
          name: ghcr-credentials
