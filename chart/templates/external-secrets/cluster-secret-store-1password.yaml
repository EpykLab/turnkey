{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.onePassword.enabled }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
  annotations:
    argocd.argoproj.io/sync-wave: "13"  # after ESO installs at wave 12
    turnkey.io/change-control: {{ .Values.argocd.repoUrl | quote }}
spec:
  provider:
    onepassword:
      connectHost: {{ .Values.externalSecrets.onePassword.connectHost | default (printf "http://onepassword-connect.%s.svc.cluster.local:8080" .Values.externalSecrets.onePassword.connect.namespace) | quote }}
      vaults:
        {{ .Values.externalSecrets.onePassword.vaultName }}: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: {{ .Values.externalSecrets.onePassword.authSecretName }}
            namespace: {{ .Values.externalSecrets.namespace }}
            key: token
{{- end }}
