# FedRAMP SC-7: Boundary Protection
# NetworkPolicy templates for strict network segmentation
# Applied to workload namespaces (NOT platform namespaces like argocd, cert-manager, etc.)
# 
# NOTE: ArgoCD namespace NetworkPolicies are deployed separately to avoid circular dependency
# See deploy/network-policies/argocd/ for ArgoCD-specific policies
{{- if .Values.fedramp.networkPolicies.enabled }}

# Only deploy to workload namespaces (not platform namespaces)
{{- if and (ne .Release.Namespace "argocd") (ne .Release.Namespace "cert-manager") (ne .Release.Namespace "kyverno") (ne .Release.Namespace "kube-system") (ne .Release.Namespace "ingress-nginx") }}
---
# Default deny-all ingress policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fedramp-sc7-default-deny-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    fedramp.turnkey.io/control: "SC-7"
    fedramp.turnkey.io/description: "Default deny all ingress traffic"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  # No ingress rules = deny all
---
# Default deny-all egress policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fedramp-sc7-default-deny-egress
  namespace: {{ .Release.Namespace }}
  annotations:
    fedramp.turnkey.io/control: "SC-7"
    fedramp.turnkey.io/description: "Default deny all egress traffic"
spec:
  podSelector: {}
  policyTypes:
    - Egress
  # No egress rules = deny all
{{- end }}
{{- end }}
